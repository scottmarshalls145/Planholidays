    :root {

      --border-radius: 20px;

    body.dark-theme {
      --bg: #121212;
      --glass-bg: rgba(30,30,30,0.85);
      --text: #f0f0f0;
      --primary: #e94560;
      --secondary: #0f3460;
      --accent: #1a1a2e;
      --card-shadow: 0 8px 32px rgba(0,0,0,0.5);
      --input-bg: rgba(50,50,50,0.5);

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
      position: relative;
    }
    .bg-animation {
      position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; overflow: hidden;
    }
    .bg-animation span {
      position: absolute; display: block; width: 20px; height: 20px;
      background: rgba(233,69,96,0.15); border-radius: 50%;
      animation: float 25s infinite; bottom: -150px;
    }
    .bg-animation span:nth-child(1){ left:25%; width:80px; height:80px; animation-delay:0s; }
    .bg-animation span:nth-child(2){ left:10%; width:40px; height:40px; animation-delay:2s; animation-duration:18s; }
    .bg-animation span:nth-child(3){ left:70%; width:60px; height:60px; animation-delay:4s; }
    .bg-animation span:nth-child(4){ left:40%; width:30px; height:30px; animation-delay:0s; animation-duration:22s; }
    .bg-animation span:nth-child(5){ left:85%; width:90px; height:90px; animation-delay:6s; animation-duration:20s; }
    @keyframes float {
      0% { transform:translateY(0) rotate(0deg); opacity:0.3; }
      50% { transform:translateY(-1000px) rotate(720deg); opacity:0; }
      100% { transform:translateY(0) rotate(0deg); opacity:0.3; }
    }
    .glass {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-radius: var(--border-radius);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: var(--card-shadow);
    }
    .container { max-width:1400px; margin:0 auto; padding:20px; }
    .btn {
      display:inline-flex; align-items:center; justify-content:center;
      padding:12px 24px; border-radius:50px; border:none; font-weight:600;
      cursor:pointer; transition: all 0.3s; font-size:0.9rem;
      letter-spacing:0.5px; text-transform:uppercase; gap:8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white; box-shadow: 0 4px 15px rgba(233,69,96,0.3);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,69,96,0.5); }
    .btn-outline {
      background: transparent; border: 2px solid var(--primary); color: var(--primary); box-shadow: none;
    }
    .btn-outline:hover { background: var(--primary); color:white; }
    input, select, textarea {
      padding:12px 18px; border-radius:50px; border:1px solid rgba(0,0,0,0.1);
      background: var(--input-bg); font-family: var(--font); color: var(--text);
      transition: all 0.3s; width:100%; outline:none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--secondary); box-shadow: 0 0 10px rgba(233,69,96,0.2); }
    textarea { border-radius: 20px; resize:vertical; min-height:80px; }
    .tab-nav { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:20px; }
    .tab-nav button {
      padding:10px 20px; border-radius:30px; border:none; background:rgba(255,255,255,0.3);
      cursor:pointer; font-weight:600; transition:0.3s; color: var(--text);
    }
    .tab-nav button.active { background: var(--secondary); color:white; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .card { padding:20px; margin-bottom:20px; }
    .dashboard-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:15px; }
    .dashboard-card { padding:20px; text-align:center; cursor:pointer; transition:0.3s; }
    .dashboard-card:hover { transform: translateY(-5px); }
    .toast {
      position:fixed; bottom:30px; right:30px; padding:15px 25px; border-radius:50px; color:white;

    }
    .toast.success { background: #2ecc71; }
    .toast.error { background: #e74c3c; }
    @keyframes slideIn { from { opacity:0; transform:translateX(100px); } to { opacity:1; transform:translateX(0); } }
    .modal {
      position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);

// ========== PURE JS SHA-256 IMPLEMENTATION (works everywhere) ==========
function sha256(str) {
  function rightRotate(value, amount) { return (value>>>amount) | (value<<(32 - amount)); }
  function mathPow32(x, y) { return Math.pow(x, y) >>> 0; }
  const maxWord = mathPow32(2, 32);
  const lengthProperty = 'length';
  let i, j;
  const result = '';
  const words = [];
  const asciiBitLength = str[lengthProperty]*8;
  let hash = [];
  const k = [];
  let primeCounter = 0;
  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (i = 0; i < 313; i += candidate) { isComposite[i] = true; }
      hash[primeCounter] = (mathPow32(candidate, .5)*maxWord)|0;
      k[primeCounter] = (mathPow32(candidate, 1/3)*maxWord)|0;
      primeCounter++;
    }
  }
  str += '\x80';
  while (str[lengthProperty]%64 - 56) str += '\x00';
  for (i = 0; i < str[lengthProperty]; i++) {
    j = str.charCodeAt(i);
    if (j>>8) return;
    words[i>>2] |= j << ((3 - i)%4)*8;
  }
  words[words[lengthProperty]] = ((asciiBitLength/maxWord)|0);
  words[words[lengthProperty]] = (asciiBitLength);
  for (j = 0; j < words[lengthProperty];) {
    const w = words.slice(j, j += 16);
    const oldHash = hash;
    hash = hash.slice(0, 8);
    for (i = 0; i < 64; i++) {
      const w15 = w[i - 15], w2 = w[i - 2];
      const a = hash[0], e = hash[4];
      const temp1 = hash[7] + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) + ((e & hash[5])^((~e) & hash[6])) + k[i] + (w[i] = (i < 16) ? w[i] : ( w[i - 16] + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15>>>3)) + w[i - 7] + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2>>>10)) )|0);
      const temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + ((a & hash[1])^(a & hash[2])^(hash[1] & hash[2]));
      hash = [(temp1 + temp2)|0].concat(hash);
      hash[4] = (hash[4] + temp1)|0;
    }
    for (i = 0; i < 8; i++) { hash[i] = (hash[i] + oldHash[i])|0; }
  }
  for (i = 0; i < 8; i++) {
    for (j = 3; j + 1; j--) {
      const b = (hash[i]>>(j*8)) & 255;
      result += ((b < 16) ? 0 : '') + b.toString(16);
    }
  }
  return result;
}

// Data Store (Firebase + localStorage hybrid)
class DataStore {
  constructor() {
    this.useFirebase = false;
    this.db = null;
  }
  async init() {
    try {
      firebase.initializeApp(firebaseConfig);
      this.db = firebase.database();
      this.useFirebase = true;
      APP.firebaseReady = true;
    } catch(e) {
      console.warn('Firebase not available, using localStorage');
    }
    await this.loadAll();
  }
  async loadAll() {
    if (this.useFirebase) {
      const snap = await this.db.ref('/').once('value');
      const data = snap.val() || {};
      APP.users = data.users || [];
      APP.quotes = data.quotes || [];
      if (data.settings) APP.settings = { ...APP.settings, ...data.settings };
    } else {
      APP.users = JSON.parse(localStorage.getItem('ph_users') || '[]');
      APP.quotes = JSON.parse(localStorage.getItem('ph_quotes') || '[]');
      const settings = JSON.parse(localStorage.getItem('ph_settings') || '{}');
      APP.settings = { ...APP.settings, ...settings };
    }
    if (!APP.users.length) {
      const hashed = sha256(APP.defaultAdmin.password);
      APP.users.push({ username: 'Plan', passwordHash: hashed, role: 'admin', locked: false, failedAttempts: 0, ipLog: [] });
      await this.saveUsers();
    }
  }
  async saveUsers() {
    if (this.useFirebase) await this.db.ref('users').set(APP.users);
    else localStorage.setItem('ph_users', JSON.stringify(APP.users));
  }
  async saveQuotes() {
    if (this.useFirebase) await this.db.ref('quotes').set(APP.quotes);
    else localStorage.setItem('ph_quotes', JSON.stringify(APP.quotes));
  }
  async saveSettings() {
    if (this.useFirebase) await this.db.ref('settings').set(APP.settings);
    else localStorage.setItem('ph_settings', JSON.stringify(APP.settings));
  }
}

const store = new DataStore();

async function login(username, password) {
  const user = APP.users.find(u => u.username === username);
  if (!user) throw new Error('Invalid credentials');
  if (user.locked) throw new Error('Account locked. Contact admin.');
  const hash = sha256(password);
  if (hash !== user.passwordHash) {
    user.failedAttempts = (user.failedAttempts||0) + 1;
    if (user.role !== 'admin' && user.failedAttempts >= 5) {
      user.locked = true;
      await store.saveUsers();
      throw new Error('Account locked due to multiple failed attempts.');
    }
    await store.saveUsers();
    throw new Error('Invalid credentials');
  }
  user.failedAttempts = 0;
  user.lastLogin = new Date().toISOString();
  try {
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const ipData = await ipRes.json();
    user.ipLog = user.ipLog || [];
    user.ipLog.push({ ip: ipData.ip, time: new Date().toISOString() });
  } catch(e) {}
  await store.saveUsers();
  return user;
}

function showView(viewId) {
  ['dashboardView','quoteEditorView','historyView','adminSettingsView','userManagementView','backupView','helpView'].forEach(id => $(id).classList.add('hidden'));
  $(viewId).classList.remove('hidden');
  if (viewId === 'dashboardView') renderDashboard();
  else if (viewId === 'historyView') renderHistory();
  else if (viewId === 'adminSettingsView') renderAdminSettings();
  else if (viewId === 'userManagementView') renderUserManagement();
  else if (viewId === 'backupView') renderBackup();
}

function renderDashboard() {
  const cards = [
    { label: '✨ New Quote', action: ()=> window.open(location.href.split('#')[0] + '#new-quote', '_blank') },
    { label: '📋 Quote History', action: ()=> showView('historyView') },
    { label: '👥 User Management', action: ()=> showView('userManagementView'), adminOnly: true },
    { label: '⚙️ Admin Settings', action: ()=> showView('adminSettingsView'), adminOnly: true },
    { label: '💾 Backup & Restore', action: ()=> showView('backupView'), adminOnly: true },
    { label: '📤 Export Data', action: ()=> exportAllData() },
    { label: '📥 Import Data', action: ()=> document.getElementById('importFile')?.click() },
    { label: '❓ Help', action: ()=> showView('helpView') }
  ];
  let html = '';
  cards.forEach(c => {
    if (c.adminOnly && APP.currentUser.role !== 'admin') return;
    html += `<div class="glass dashboard-card" onclick="(${c.action.toString()})()">${c.label}</div>`;
  });
  $('dashboardCards').innerHTML = html;
}

function applyBranding() {

  const logo = APP.settings.branding.logo;

// Quote Editor core
let currentQuote = null;
function initQuoteEditor(mode, quoteId=null) {
  if (mode === 'new') {
    currentQuote = {
      id: generateId(), quoteNumber: 'Q' + Date.now(), createdAt: new Date().toISOString(),
      customerName: '', phone: '', email: '', passengers: '', agent: APP.currentUser.username,
      leadSource: '', notes: '', flights: [], flightImage: null, hotels: [], transfers: [],
      totalPrice: 0, deposit: 0, instalments: 4, paymentSchedule: [], destination: ''
    };
  } else {
    currentQuote = APP.quotes.find(q => q.id === quoteId);
    if (!currentQuote) { toast('Quote not found','error'); window.location.hash=''; return; }
  }
  $('editorTitle').textContent = mode === 'new' ? 'New Quote' : 'Edit Quote ' + currentQuote.quoteNumber;
  const tabs = ['Customer','Flights','Hotels','Transfers','Payment','Conditions','Branding'];
  let tabHtml = '';
  tabs.forEach((t,i) => tabHtml += `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(${i})">${t}</button>`);
  $('quoteTabs').innerHTML = tabHtml;
  switchTab(0);
  showView('quoteEditorView');
}
function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  const container = $('quoteTabContent');
  switch(idx) {
    case 0: container.innerHTML = renderCustomerTab(); break;
    case 1: container.innerHTML = renderFlightsTab(); break;
    case 2: container.innerHTML = renderHotelsTab(); break;
    case 3: container.innerHTML = renderTransfersTab(); break;
    case 4: container.innerHTML = renderPaymentTab(); break;
    case 5: container.innerHTML = `<div class="glass card"><h4>Booking Conditions</h4><p>${APP.settings.bookingConditions}</p></div>`; break;
    case 6: container.innerHTML = `<div class="glass card"><h4>Branding</h4><p>${APP.settings.branding.companyName}</p></div>`; break;
  }
}

// Start everything
window.onload = async () => {
  await store.init();
  applyBranding();
  const remembered = localStorage.getItem('ph_remembered');
  if (remembered) { $('loginUsername').value = remembered; $('rememberMe').checked = true; }
  $('loginBtn').onclick = async () => {
    $('loginError').textContent = '';
    $('loginLoading').classList.remove('hidden');
    try {
      const user = await login($('loginUsername').value, $('loginPassword').value);
      APP.currentUser = user;
      if ($('rememberMe').checked) localStorage.setItem('ph_remembered', user.username);
      else localStorage.removeItem('ph_remembered');
      $('loginScreen').classList.add('hidden');
      $('mainApp').classList.remove('hidden');
      showView('dashboardView');
    } catch(e) { $('loginError').textContent = e.message; }
    $('loginLoading').classList.add('hidden');
  };
  $('togglePassword').onclick = () => {
    const inp = $('loginPassword'); inp.type = inp.type==='password'?'text':'password';
  };
  $('logoutBtn').onclick = () => {
    APP.currentUser = null;
    $('mainApp').classList.add('hidden');
    $('loginScreen').classList.remove('hidden');
    window.location.hash = '';
  };
  $('themeToggle').onclick = () => {
    document.body.classList.toggle('dark-theme');
    localStorage.setItem('ph_theme', document.body.classList.contains('dark-theme')?'dark':'light');
  };
  if (localStorage.getItem('ph_theme') === 'dark') document.body.classList.add('dark-theme');
  window.onhashchange = () => {
    const hash = window.location.hash.substr(1);
    if (hash === 'new-quote') initQuoteEditor('new');
    else if (hash.startsWith('edit-quote/')) initQuoteEditor('edit', hash.split('/')[1]);
    else if (hash === 'history') showView('historyView');
    else if (hash === 'admin') showView('adminSettingsView');
    else if (hash === 'users') showView('userManagementView');
    else if (hash === 'backup') showView('backupView');
    else if (hash === '') showView('dashboardView');
  };
  if (window.location.hash) window.onhashchange();
  // hidden import trigger
  document.body.insertAdjacentHTML('beforeend', '<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this.files[0])">');
};
